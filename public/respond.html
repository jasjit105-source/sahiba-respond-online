<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahiba CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#0a0a0b;--bg-panel:#141416;--bg-elevated:#1a1a1d;--bg-hover:#222226;--border:#2a2a2e;--border-strong:#3a3a3e;--text:#f4f1ea;--text-muted:#8a8680;--text-dim:#56534e;--accent:#d4a574;--accent-hover:#e2b787;--accent-dim:rgba(212,165,116,.12);--accent-glow:rgba(212,165,116,.25);--green:#3fb968;--green-dim:rgba(63,185,104,.12);--amber:#f0b429;--amber-dim:rgba(240,180,41,.12);--red:#e5484d;--red-dim:rgba(229,72,77,.12);--blue:#5c9eff;--blue-dim:rgba(92,158,255,.12);--purple:#a97bff;--purple-dim:rgba(169,123,255,.12)}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;font-family:'Inter Tight',-apple-system,sans-serif;background:var(--bg-deep);color:var(--text);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:-30%;right:-10%;width:60%;height:60%;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 60%);pointer-events:none;z-index:0;filter:blur(100px);opacity:.4}
.app{display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.topbar{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;gap:24px}
.brand{display:flex;align-items:baseline;gap:8px;padding-right:20px;border-right:1px solid var(--border)}.brand-mark{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-.5px;font-variation-settings:'opsz' 144}.brand-mark .dot{display:inline-block;width:5px;height:5px;background:var(--accent);border-radius:50%;vertical-align:super;margin-left:2px;box-shadow:0 0 10px var(--accent-glow)}.brand-tag{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--text-muted)}
.nav-section{display:flex;gap:2px;flex:1}.nav-item{display:flex;align-items:center;gap:7px;padding:7px 12px;border:none;background:none;color:var(--text-muted);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;border-radius:7px;transition:all .15s}.nav-item:hover{background:var(--bg-hover);color:var(--text)}.nav-item.active{background:var(--accent-dim);color:var(--accent)}.nav-item .icon{width:14px;height:14px;stroke-width:1.8}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}.lang-toggle{padding:4px 10px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-muted);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all .15s}.lang-toggle:hover{border-color:var(--accent);color:var(--text)}.conn-indicator{display:flex;align-items:center;gap:7px;padding:5px 10px;border:1px solid var(--border);border-radius:16px;background:var(--bg-elevated);font-size:11px;color:var(--text-muted)}.status-pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,104,.6)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.agent-tabs{display:flex;gap:4px;margin-bottom:20px}.agent-tab{padding:8px 18px;border:1px solid var(--border);background:var(--bg-panel);color:var(--text-muted);border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}.agent-tab:hover{border-color:var(--border-strong);color:var(--text)}.agent-tab.active{background:var(--accent);color:var(--bg-deep);border-color:var(--accent)}
.main{padding:24px 28px 40px;max-width:1600px;margin:0 auto;width:100%}.view{display:none;animation:fadeIn .25s ease}.view.active{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px}.page-title h1{font-family:'Fraunces',serif;font-weight:500;font-size:30px;letter-spacing:-1px;font-variation-settings:'opsz' 144}.page-title .subtitle{font-size:12.5px;color:var(--text-muted);margin-top:5px}
.btn{padding:8px 14px;border:1px solid var(--border);background:var(--bg-panel);color:var(--text);border-radius:7px;font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}.btn:hover{background:var(--bg-hover);border-color:var(--border-strong)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}.stat-tile{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px}.stat-tile .label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--text-muted);margin-bottom:8px}.stat-tile .value{font-family:'Fraunces',serif;font-size:32px;font-weight:400;letter-spacing:-1.5px;font-variation-settings:'opsz' 144}.stat-tile .value .unit{font-family:'Inter Tight';font-size:13px;color:var(--text-muted);font-weight:500;margin-left:3px}.stat-tile.accent .value{color:var(--accent)}.stat-tile.green .value{color:var(--green)}.stat-tile.amber .value{color:var(--amber)}.stat-tile .trend{margin-top:6px;font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}.search-input{flex:1;padding:10px 14px 10px 36px;background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:12.5px;background-image:url("data:image/svg+xml,%3Csvg width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%238a8680' stroke-width='2' stroke-linecap='round' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='M21 21l-4.3-4.3'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:12px center}.search-input::placeholder{color:var(--text-dim)}.search-input:focus{outline:none;border-color:var(--accent)}
.select-input{padding:10px 30px 10px 12px;background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:12.5px;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='9' height='9' viewBox='0 0 24 24' fill='none' stroke='%238a8680' stroke-width='2' stroke-linecap='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:calc(100% - 10px) center}.select-input:focus{outline:none;border-color:var(--accent)}
.count-tag{padding:5px 10px;background:var(--bg-panel);border:1px solid var(--border);border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-muted)}.count-tag strong{color:var(--text);font-weight:500}
.table-shell{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}.table-scroll{overflow-x:auto;max-height:calc(100vh - 290px);overflow-y:auto}.table-scroll::-webkit-scrollbar{width:8px;height:8px}.table-scroll::-webkit-scrollbar-track{background:var(--bg-panel)}.table-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
table{width:100%;min-width:1100px;border-collapse:collapse;font-size:12.5px;table-layout:fixed}col.c-name{width:180px}col.c-tag{width:72px}col.c-score{width:72px}col.c-city{width:130px}col.c-life{width:105px}col.c-days{width:65px}col.c-status{width:140px}col.c-notes{width:170px}col.c-wa{width:135px}
thead{position:sticky;top:0;z-index:10;background:var(--bg-elevated)}th{padding:10px 14px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;text-transform:uppercase;letter-spacing:.15em;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}tbody tr{transition:background .12s;height:52px}tbody tr:hover{background:var(--bg-hover)}tbody tr:last-child td{border-bottom:none}
tbody tr.is-new{background:var(--accent-dim)}tbody tr.is-new:hover{background:rgba(212,165,116,.18)}tbody tr.is-new td:first-child{box-shadow:inset 3px 0 0 var(--accent)}
tbody tr.is-handoff{background:var(--purple-dim)}tbody tr.is-handoff:hover{background:rgba(169,123,255,.18)}tbody tr.is-handoff td:first-child{box-shadow:inset 3px 0 0 var(--purple)}
.name-cell{display:flex;flex-direction:column;gap:1px}.name-text{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis}.name-sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-muted)}
.new-pill{display:inline-block;padding:3px 7px;background:var(--accent);color:var(--bg-deep);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.handoff-pill{display:inline-block;padding:3px 7px;background:var(--purple);color:#fff;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.score-chip{display:inline-flex;padding:3px 9px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;background:var(--bg-elevated);border:1px solid var(--border)}.score-chip.hot{color:var(--red);border-color:var(--red-dim);background:var(--red-dim)}.score-chip.warm{color:var(--amber);border-color:var(--amber-dim);background:var(--amber-dim)}.score-chip.cold{color:var(--text-muted)}
.city-text{color:var(--text-muted);font-size:12px;display:block;overflow:hidden;text-overflow:ellipsis}.lifecycle-tag{display:inline-block;padding:3px 8px;border-radius:14px;font-size:10.5px;font-weight:500;background:var(--bg-elevated);color:var(--text-muted);border:1px solid var(--border)}
.days-chip{display:inline-flex;align-items:baseline;gap:1px;padding:3px 9px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}.days-chip .du{font-size:8.5px;font-weight:400;opacity:.65;margin-left:1px}.days-fresh{background:var(--green-dim);color:var(--green)}.days-aging{background:var(--amber-dim);color:var(--amber)}.days-stale{background:var(--red-dim);color:var(--red)}
.status-select{padding:5px 26px 5px 9px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:11.5px;font-weight:500;cursor:pointer;appearance:none;-webkit-appearance:none;width:100%;background-image:url("data:image/svg+xml,%3Csvg width='8' height='8' viewBox='0 0 24 24' fill='none' stroke='%238a8680' stroke-width='2' stroke-linecap='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:calc(100% - 7px) center;transition:all .15s}.status-select:focus{outline:none;border-color:var(--accent)}
.notes-field{padding:5px 9px;background:transparent;border:1px solid transparent;border-radius:5px;color:var(--text);font-family:inherit;font-size:12px;width:100%;transition:all .15s}.notes-field::placeholder{color:var(--text-dim)}.notes-field:hover{background:var(--bg-elevated)}.notes-field:focus{outline:none;background:var(--bg-elevated);border-color:var(--accent)}
.wa-action{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:var(--green);color:#fff;border:none;border-radius:5px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap}.wa-action:hover{background:#4ac77a;transform:translateY(-1px);box-shadow:0 3px 10px rgba(63,185,104,.3)}.wa-action.sent{background:var(--bg-elevated);color:var(--green);border:1px solid rgba(63,185,104,.3)}.wa-action.sent:hover{background:var(--green-dim)}.wa-date{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:3px}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}.upload-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:20px}.upload-card h3{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}.upload-card h3 .agent-dot{width:8px;height:8px;border-radius:50%}.dot-nancy{background:var(--accent)}.dot-jazmin{background:var(--purple)}
.dropzone{border:1.5px dashed var(--border-strong);border-radius:10px;padding:36px 16px;text-align:center;cursor:pointer;transition:all .2s}.dropzone:hover,.dropzone.dragover{border-color:var(--accent);background:var(--accent-dim)}.dropzone h4{font-size:13px;font-weight:600;margin-bottom:3px}.dropzone p{font-size:11.5px;color:var(--text-muted)}.dropzone input{display:none}
.upload-result{display:none;margin-top:12px;padding:12px 16px;border-radius:8px;font-size:12px;font-family:'JetBrains Mono',monospace}.upload-result.success{display:block;background:var(--green-dim);color:var(--green);border:1px solid rgba(63,185,104,.3)}.upload-result.error{display:block;background:var(--red-dim);color:var(--red);border:1px solid rgba(229,72,77,.3)}
.msg-editor{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}.msg-editor-header{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;margin-bottom:10px}.msg-hint{margin-left:auto;font-size:10.5px;font-weight:400;color:var(--text-muted)}.msg-hint code{background:var(--bg-elevated);padding:2px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--accent)}.msg-textarea{width:100%;padding:10px 12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;line-height:1.5;resize:vertical;min-height:60px;transition:border-color .15s}.msg-textarea:focus{outline:none;border-color:var(--accent)}.msg-actions{display:flex;gap:6px;align-items:center;margin-top:8px}.msg-saved{font-size:11px;color:var(--green);margin-left:6px;opacity:0;transition:opacity .3s}.msg-saved.show{opacity:1}
.breakdown-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.breakdown-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:20px 22px}.breakdown-card h3{font-family:'Fraunces',serif;font-weight:500;font-size:16px;margin-bottom:14px;letter-spacing:-.3px}.breakdown-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}.breakdown-row:last-child{border-bottom:none}.breakdown-label{min-width:110px;font-size:12.5px;font-weight:500}.breakdown-bar-wrap{flex:1;height:4px;background:var(--bg-elevated);border-radius:2px;overflow:hidden}.breakdown-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .5s cubic-bezier(.16,1,.3,1)}.breakdown-count{font-family:'JetBrains Mono',monospace;font-size:12px;min-width:30px;text-align:right;color:var(--text-muted)}
.loading{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:12.5px}.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.topbar{padding:0 12px;gap:12px;overflow-x:auto}.brand{padding-right:12px}.brand-tag{display:none}.nav-item{padding:5px 8px;font-size:11px}.main{padding:16px 12px 40px}.page-title h1{font-size:24px}.stats-grid{grid-template-columns:repeat(2,1fr)}.stat-tile .value{font-size:26px}.upload-grid{grid-template-columns:1fr}.breakdown-grid{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}.agent-tabs{flex-wrap:wrap}th,td{padding:8px 10px;font-size:11.5px}}
</style>
</head>
<body>
<div class="app" id="app">
<nav class="topbar">
<div class="brand"><div class="brand-mark">Sahiba<span class="dot"></span></div><div class="brand-tag">CRM</div></div>
<div class="nav-section">
<button class="nav-item active" data-view="contacts"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span data-t="contacts">Contactos</span></button>
<button class="nav-item nav-admin" data-view="upload"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span data-t="upload">Upload</span></button>
<button class="nav-item" data-view="historial"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span data-t="history">Historial</span></button>
<button class="nav-item nav-admin" data-view="stats"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg><span data-t="summary">Resumen</span></button>
</div>
<div class="topbar-right"><button class="lang-toggle" id="langBtn" onclick="toggleLang()">EN</button><div class="conn-indicator"><div class="status-pulse" id="connStatus"></div><span id="connText">OK</span></div></div>
</nav>
<main class="main">
<div class="view active" id="contactsView">
<div class="page-header"><div class="page-title"><h1 data-t="contacts_title">Contactos</h1><div class="subtitle" data-t="contacts_sub">WhatsApp Pipeline</div></div><button class="btn" onclick="loadContacts()"><span data-t="refresh">Refresh</span></button></div>
<div class="agent-tabs admin-only" id="agentTabs"><button class="agent-tab active" onclick="switchAgent('nancy')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:6px"></span>Nancy</button><button class="agent-tab" onclick="switchAgent('jazmin')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--purple);margin-right:6px"></span>Jazmin</button></div>
<div class="stats-grid" id="quickStats"></div>
<div class="toolbar"><input class="search-input" id="searchInput" type="text" data-ph="search_ph" placeholder="Search..."><select class="select-input" id="statusFilter"><option value="all" data-t="all_status">All</option><option>Pendiente</option><option>Contactada</option><option>Respondió</option><option>Sin Respuesta</option><option>Venta</option><option>No Interesada</option></select><span class="count-tag"><strong id="countLabel">0</strong> <span data-t="results">results</span></span></div>
<div class="table-shell"><div class="table-scroll" id="tableScroll"><div class="loading"><div class="spinner"></div></div></div></div>
</div>
<div class="view" id="uploadView">
<div class="page-header"><div class="page-title"><h1 data-t="upload_title">Upload</h1><div class="subtitle" data-t="upload_sub">Auto-merge · filters Customers & score &lt;400</div></div></div>
<div class="msg-editor"><div class="msg-editor-header"><span data-t="wa_message">WhatsApp Message</span><span class="msg-hint"><code>{nombre}</code></span></div><div style="display:flex;gap:8px;margin-bottom:8px"><button class="btn" style="font-size:11px" onclick="showMsgFor('nancy')">Nancy</button><button class="btn" style="font-size:11px" onclick="showMsgFor('jazmin')">Jazmin</button></div><textarea class="msg-textarea" id="waMsgInput" rows="3"></textarea><div class="msg-actions"><button class="btn" onclick="saveWaMsg()" data-t="save_msg">Save</button><button class="btn" onclick="resetWaMsg()" style="color:var(--text-muted)" data-t="reset_msg">Reset</button><span class="msg-saved" id="msgSaved"></span></div></div>
<div class="upload-grid"><div class="upload-card"><h3><span class="agent-dot dot-nancy"></span>Nancy</h3><div class="dropzone" id="dz-nancy"><h4 data-t="drop_file">Drop file here</h4><p>.xlsx</p><input type="file" id="fi-nancy" accept=".xlsx,.xls"></div><div class="upload-result" id="ur-nancy"></div></div><div class="upload-card"><h3><span class="agent-dot dot-jazmin"></span>Jazmin</h3><div class="dropzone" id="dz-jazmin"><h4 data-t="drop_file">Drop file here</h4><p>.xlsx</p><input type="file" id="fi-jazmin" accept=".xlsx,.xls"></div><div class="upload-result" id="ur-jazmin"></div></div></div>
</div>
<div class="view" id="historialView">
<div class="page-header"><div class="page-title"><h1 data-t="history_title">History</h1><div class="subtitle" data-t="history_sub">Archived with notes</div></div></div>
<div class="agent-tabs admin-only" id="histAgentTabs"><button class="agent-tab active" onclick="switchHistAgent('nancy')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:6px"></span>Nancy</button><button class="agent-tab" onclick="switchHistAgent('jazmin')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--purple);margin-right:6px"></span>Jazmin</button></div>
<div class="toolbar"><input class="search-input" id="histSearchInput" type="text" placeholder="Search..."><span class="count-tag"><strong id="histCountLabel">0</strong> <span data-t="archived">archived</span></span></div>
<div class="table-shell"><div class="table-scroll" id="histTableScroll"><div class="loading"><div class="spinner"></div></div></div></div>
</div>
<div class="view" id="statsView">
<div class="page-header"><div class="page-title"><h1 data-t="summary_title">Summary</h1></div></div>
<div class="agent-tabs admin-only" id="statsAgentTabs"><button class="agent-tab active" onclick="switchStatsAgent('nancy')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:6px"></span>Nancy</button><button class="agent-tab" onclick="switchStatsAgent('jazmin')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--purple);margin-right:6px"></span>Jazmin</button></div>
<div class="stats-grid" id="fullStats"></div>
<div class="breakdown-grid"><div class="breakdown-card"><h3 data-t="by_status">By Status</h3><div id="statusBreakdown"></div></div><div class="breakdown-card"><h3 data-t="by_agent">By Agent</h3><div id="agentBreakdown"></div></div></div>
</div>
</main>
</div>
<script>
const T={es:{contacts:'Contactos',upload:'Subir Lista',history:'Historial',summary:'Resumen',contacts_title:'Contactos',contacts_sub:'Pipeline de WhatsApp',upload_title:'Subir Lista',upload_sub:'Auto-merge · filtra Customers y score <400',history_title:'Historial',history_sub:'Archivados con notas',summary_title:'Resumen',refresh:'Actualizar',loading:'Cargando...',results:'resultados',archived:'archivados',all_status:'Todos',search_ph:'Buscar por nombre o teléfono...',drop_file:'Arrastra aquí',wa_message:'Mensaje de WhatsApp',save_msg:'Guardar',reset_msg:'Restaurar',by_status:'Por Estado',by_agent:'Por Agente',th_client:'Cliente',th_tag:'Tag',th_score:'Score',th_city:'Ciudad',th_life:'Lifecycle',th_days:'Días',th_status:'Estado',th_notes:'Notas',th_wa:'WhatsApp',send:'Enviar',resend:'Reenviar',note_ph:'Nota...',total:'Total',new_lbl:'Nuevos',pending:'Pendientes',sales:'Ventas',since_sync:'último sync',no_data:'Sin datos',processing:'Procesando...',new_count:'nuevos',updated:'actualizados',archived_count:'archivados',cleaned:'eliminados',handoff:'De Jazmin'},
en:{contacts:'Contacts',upload:'Upload',history:'History',summary:'Summary',contacts_title:'Contacts',contacts_sub:'WhatsApp Pipeline',upload_title:'Upload List',upload_sub:'Auto-merge · filters Customers & score <400',history_title:'History',history_sub:'Archived with notes',summary_title:'Summary',refresh:'Refresh',loading:'Loading...',results:'results',archived:'archived',all_status:'All',search_ph:'Search by name or phone...',drop_file:'Drop file here',wa_message:'WhatsApp Message',save_msg:'Save',reset_msg:'Reset',by_status:'By Status',by_agent:'By Agent',th_client:'Client',th_tag:'Tag',th_score:'Score',th_city:'City',th_life:'Lifecycle',th_days:'Days',th_status:'Status',th_notes:'Notes',th_wa:'WhatsApp',send:'Send',resend:'Resend',note_ph:'Note...',total:'Total',new_lbl:'New',pending:'Pending',sales:'Sales',since_sync:'last sync',no_data:'No data',processing:'Processing...',new_count:'new',updated:'updated',archived_count:'archived',cleaned:'cleaned',handoff:'From Jazmin'}};
let LANG=localStorage.getItem('sahiba_lang')||'es';
function t(k){return T[LANG][k]||T.es[k]||k}
function applyLang(){document.getElementById('langBtn').textContent=LANG==='es'?'EN':'ES';document.querySelectorAll('[data-t]').forEach(el=>{const k=el.dataset.t;if(T[LANG][k])el.textContent=T[LANG][k]});document.querySelectorAll('[data-ph]').forEach(el=>{const k=el.dataset.ph;if(T[LANG][k])el.placeholder=T[LANG][k]})}
function toggleLang(){LANG=LANG==='es'?'en':'es';localStorage.setItem('sahiba_lang',LANG);applyLang();loadContacts()}

const API_BASE=window.location.origin,AUTH_TOKEN='sahiba2026';
const STATUSES=['Pendiente','Contactada','Respondió','Sin Respuesta','Venta','No Interesada'];
const DEFAULT_MSG={nancy:'Hola {nombre}, soy Nancy de Sahiba. Te escribo para dar seguimiento a tu interés en nuestra colección. Si ya estás listo(a), puedo ayudarte a completar tu pedido sin problema. También te comparto nuestro catálogo actualizado 😊',jazmin:'Hola {nombre}, soy Jazmin de Sahiba. Te escribo para dar seguimiento a tu interés en nuestra colección. Si ya estás listo(a), puedo ayudarte a completar tu pedido sin problema. También te comparto nuestro catálogo actualizado 😊'};
const urlParams=new URLSearchParams(window.location.search);
const VIEW_MODE=urlParams.get('v');
const IS_ADMIN=!VIEW_MODE;
let currentAgent=VIEW_MODE||'nancy',currentHistAgent=VIEW_MODE||'nancy',currentStatsAgent=VIEW_MODE||'nancy',currentMsgAgent='nancy',allContacts=[],debounceTimer=null;
if(!IS_ADMIN)document.querySelectorAll('.admin-only,.nav-admin').forEach(el=>el.style.display='none');
function getWaMsg(a){return localStorage.getItem('sahiba_wa_msg_'+a)||DEFAULT_MSG[a]||DEFAULT_MSG.nancy}
function setWaMsg(a,msg){localStorage.setItem('sahiba_wa_msg_'+a,msg)}
async function api(path,method,body){method=method||'GET';const opts={method,headers:{'Authorization':'Bearer '+AUTH_TOKEN,'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);const res=await fetch(API_BASE+'/api/tracker'+path,opts);if(!res.ok)throw new Error('API '+res.status);document.getElementById('connStatus').classList.remove('off');return res.json()}
function showView(name){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(name+'View').classList.add('active');document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active',t.dataset.view===name));if(name==='stats')loadStats();if(name==='historial')loadHistorial()}
document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',function(){showView(this.dataset.view)}));
function switchAgent(a){currentAgent=a;document.querySelectorAll('#agentTabs .agent-tab').forEach(function(t){t.classList.toggle('active',t.textContent.trim().toLowerCase().includes(a))});loadContacts()}
function switchHistAgent(a){currentHistAgent=a;document.querySelectorAll('#histAgentTabs .agent-tab').forEach(function(t){t.classList.toggle('active',t.textContent.trim().toLowerCase().includes(a))});loadHistorial()}
function switchStatsAgent(a){currentStatsAgent=a;document.querySelectorAll('#statsAgentTabs .agent-tab').forEach(function(t){t.classList.toggle('active',t.textContent.trim().toLowerCase().includes(a))});loadStats()}

async function loadContacts(){var params=new URLSearchParams();params.set('agent',currentAgent);var status=document.getElementById('statusFilter').value;var search=document.getElementById('searchInput').value.trim();if(status!=='all')params.set('status',status);if(search)params.set('search',search);try{var data=await api('/contacts?'+params);allContacts=data;renderContacts(data)}catch(e){document.getElementById('tableScroll').innerHTML='<div class="loading" style="color:var(--red)">'+e.message+'</div>'}}

function scoreClass(s){if(!s)return'cold';if(s>=1000)return'hot';if(s>=500)return'warm';return'cold'}
function renderDays(h){if(!h&&h!==0)return'<span style="color:var(--text-dim)">—</span>';var d=Math.floor(h/24);var cls=d>=30?'days-stale':d>=7?'days-aging':'days-fresh';return'<span class="days-chip '+cls+'">'+d+'<span class="du">d</span></span>'}
function waSentAgo(d){if(!d)return'';var diff=Math.floor((Date.now()-new Date(d).getTime())/86400000);if(diff===0)return LANG==='en'?'Today':'Hoy';return LANG==='en'?diff+'d ago':'Hace '+diff+'d'}
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML}

function renderContacts(contacts){
  document.getElementById('countLabel').textContent=contacts.length;
  var total=contacts.length,newC=contacts.filter(function(c){return c.is_new}).length,pending=contacts.filter(function(c){return c.status==='Pendiente'}).length,sales=contacts.filter(function(c){return c.status==='Venta'}).length;
  var handoffs=contacts.filter(function(c){return c.source==='jazmin_handoff'}).length;
  document.getElementById('quickStats').innerHTML='<div class="stat-tile"><div class="label">'+t('total')+'</div><div class="value">'+total+'</div></div><div class="stat-tile accent"><div class="label">'+t('new_lbl')+'</div><div class="value">'+newC+'</div><div class="trend">'+t('since_sync')+'</div></div><div class="stat-tile amber"><div class="label">'+t('pending')+'</div><div class="value">'+pending+'</div></div><div class="stat-tile green"><div class="label">'+t('sales')+'</div><div class="value">'+sales+'</div></div>';
  if(!contacts.length){document.getElementById('tableScroll').innerHTML='<div class="loading">'+t('no_data')+'</div>';return}
  var html='<table><colgroup><col class="c-name"><col class="c-tag"><col class="c-score"><col class="c-city"><col class="c-life"><col class="c-days"><col class="c-status"><col class="c-notes"><col class="c-wa"></colgroup><thead><tr><th>'+t('th_client')+'</th><th>'+t('th_tag')+'</th><th>'+t('th_score')+'</th><th>'+t('th_city')+'</th><th>'+t('th_life')+'</th><th>'+t('th_days')+'</th><th>'+t('th_status')+'</th><th>'+t('th_notes')+'</th><th>'+t('th_wa')+'</th></tr></thead><tbody>';
  for(var idx=0;idx<contacts.length;idx++){var c=contacts[idx];
    var waUrl='https://wa.me/'+c.phone+'?text='+encodeURIComponent(getWaMsg(currentAgent).replace('{nombre}',c.name||''));
    var sentCls=c.whatsapp_sent?'sent':'';var sentLbl=c.whatsapp_sent?'✓ '+t('resend'):t('send');var sentDate=c.whatsapp_sent_date?waSentAgo(c.whatsapp_sent_date):'';
    var isHandoff=c.source==='jazmin_handoff';
    var rowCls=isHandoff?'is-handoff':c.is_new?'is-new':'';
    var tagHtml=isHandoff?'<span class="handoff-pill">'+t('handoff')+'</span>':c.is_new?'<span class="new-pill">nuevo</span>':'<span style="color:var(--text-dim)">—</span>';
    html+='<tr class="'+rowCls+'"><td><div class="name-cell"><div class="name-text">'+esc(c.name||'—')+'</div><div class="name-sub">'+esc(c.phone||'')+'</div></div></td><td>'+tagHtml+'</td><td><span class="score-chip '+scoreClass(c.crm_score)+'">'+(c.crm_score||'—')+'</span></td><td><span class="city-text">'+esc(c.city||'—')+'</span></td><td>'+(c.lifecycle?'<span class="lifecycle-tag">'+esc(c.lifecycle)+'</span>':'<span style="color:var(--text-dim)">—</span>')+'</td><td>'+renderDays(c.hours_since)+'</td><td><select class="status-select" onchange="updateStatus('+c.id+',this.value)">'+STATUSES.map(function(s){return'<option '+(s===c.status?'selected':'')+'>'+s+'</option>'}).join('')+'</select></td><td><input class="notes-field" value="'+esc(c.notes||'')+'" onchange="updateNotes('+c.id+',this.value)" placeholder="'+t('note_ph')+'"></td><td><a class="wa-action '+sentCls+'" href="'+waUrl+'" target="_blank" onclick="markSent('+c.id+',this)">'+sentLbl+'</a>'+(sentDate?'<span class="wa-date">'+sentDate+'</span>':'')+'</td></tr>'}
  html+='</tbody></table>';document.getElementById('tableScroll').innerHTML=html}

async function updateStatus(id,status){try{await api('/contact/'+id+'?agent='+currentAgent,'PUT',{agent:currentAgent,status})}catch(e){alert(e.message)}}
async function updateNotes(id,notes){try{await api('/contact/'+id+'?agent='+currentAgent,'PUT',{agent:currentAgent,notes})}catch(e){alert(e.message)}}
async function markSent(id,btn){try{await api('/contact/'+id+'?agent='+currentAgent,'PUT',{agent:currentAgent,whatsapp_sent:true});btn.classList.add('sent');btn.textContent='✓ '+t('resend');var today=LANG==='en'?'Today':'Hoy';var dateEl=btn.parentElement.querySelector('.wa-date');if(dateEl)dateEl.textContent=today;else{var sp=document.createElement('span');sp.className='wa-date';sp.textContent=today;btn.parentElement.appendChild(sp)}}catch(e){}}
document.getElementById('searchInput').addEventListener('input',function(){clearTimeout(debounceTimer);debounceTimer=setTimeout(loadContacts,400)});
document.getElementById('statusFilter').addEventListener('change',loadContacts);

['nancy','jazmin'].forEach(function(agent){var dz=document.getElementById('dz-'+agent),fi=document.getElementById('fi-'+agent);dz.addEventListener('click',function(){fi.click()});dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover')});dz.addEventListener('dragleave',function(){dz.classList.remove('dragover')});dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files.length)processUpload(agent,e.dataTransfer.files[0])});fi.addEventListener('change',function(e){if(e.target.files.length)processUpload(agent,e.target.files[0])})});

async function processUpload(agent,file){var el=document.getElementById('ur-'+agent);el.className='upload-result';el.style.display='block';el.textContent=t('processing');try{var data=await readExcel(file);var r=await api('/upload','POST',{agent:agent,contacts:data});el.className='upload-result success';el.innerHTML='✓ <strong>'+r.newCount+'</strong> '+t('new_count')+' · <strong>'+r.updatedCount+'</strong> '+t('updated')+' · <strong>'+(r.archivedCount||0)+'</strong> '+t('archived_count')+' · <strong>'+(r.cleanedCount||0)+'</strong> '+t('cleaned');if(agent===currentAgent)loadContacts()}catch(e){el.className='upload-result error';el.textContent=e.message}}

function readExcel(file){return new Promise(function(resolve,reject){var reader=new FileReader();reader.onload=function(e){try{var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1});var hdr=rows[0]||[];var hMap={};hdr.forEach(function(h,i){hMap[String(h).toLowerCase().trim()]=i});var contacts=[];for(var i=1;i<rows.length;i++){var r=rows[i];if(!r||!r.length)continue;var phone=String(r[hMap['phone']||3]||'').replace(/[^0-9]/g,'');if(!phone)continue;var lifecycle=r[hMap['lifecycle']||6]||'';var score=r[hMap['crm_score']||9]||0;var isCustomer=String(lifecycle).toLowerCase().trim()==='customer';if(!isCustomer&&Number(score)<400)continue;contacts.push({phone:phone,name:r[hMap['name']||2]||'',buy_score:r[hMap['buy_score']||0]||null,window:r[hMap['window']||1]||'',agent:r[hMap['agent']||4]||'',city:r[hMap['city']||5]||'',lifecycle:lifecycle,reasons:r[hMap['reasons']||7]||'',hours_since:r[hMap['hours_since']||8]||null,crm_score:score||null,priority:r[hMap['priority']||10]||''})}resolve(contacts)}catch(err){reject(err)}};reader.onerror=function(){reject(new Error('Read error'))};reader.readAsArrayBuffer(file)})}

function showMsgFor(a){currentMsgAgent=a;document.getElementById('waMsgInput').value=getWaMsg(a)}
function saveWaMsg(){setWaMsg(currentMsgAgent,document.getElementById('waMsgInput').value.trim());var s=document.getElementById('msgSaved');s.textContent='✓';s.classList.add('show');setTimeout(function(){s.classList.remove('show')},2000);if(currentMsgAgent===currentAgent)loadContacts()}
function resetWaMsg(){document.getElementById('waMsgInput').value=DEFAULT_MSG[currentMsgAgent];setWaMsg(currentMsgAgent,DEFAULT_MSG[currentMsgAgent])}

var histDebounce=null;document.getElementById('histSearchInput').addEventListener('input',function(){clearTimeout(histDebounce);histDebounce=setTimeout(loadHistorial,400)});
async function loadHistorial(){var params=new URLSearchParams();params.set('agent',currentHistAgent);var search=document.getElementById('histSearchInput').value.trim();if(search)params.set('search',search);try{var data=await api('/historial?'+params);document.getElementById('histCountLabel').textContent=data.length;if(!data.length){document.getElementById('histTableScroll').innerHTML='<div class="loading">'+t('no_data')+'</div>';return}var html='<table style="min-width:900px"><thead><tr><th>'+t('th_client')+'</th><th>Tel</th><th>Agent</th><th>'+t('th_city')+'</th><th>'+t('th_status')+'</th><th>WA</th><th>'+t('th_notes')+'</th><th>Fecha</th></tr></thead><tbody>';for(var i=0;i<data.length;i++){var r=data[i];var d=r.date_archived?new Date(r.date_archived).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}):'—';html+='<tr><td><strong>'+esc(r.name||'—')+'</strong></td><td class="name-sub">'+esc(r.phone)+'</td><td>'+esc(r.agent||'—')+'</td><td class="city-text">'+esc(r.city||'—')+'</td><td><span class="lifecycle-tag">'+esc(r.status||'—')+'</span></td><td>'+(r.whatsapp_sent?'<span style="color:var(--green)">✓</span>':'—')+'</td><td style="white-space:normal;max-width:200px;font-size:11.5px;color:var(--accent)">'+esc(r.notes||'')+'</td><td class="name-sub">'+d+'</td></tr>'}html+='</tbody></table>';document.getElementById('histTableScroll').innerHTML=html}catch(e){document.getElementById('histTableScroll').innerHTML='<div class="loading" style="color:var(--red)">'+e.message+'</div>'}}

async function loadStats(){try{var stats=await api('/stats?agent='+currentStatsAgent);var convPct=stats.total>0?Math.round(((stats.byStatus.find(function(s){return s.status==='Venta'})||{count:0}).count/stats.total)*100):0;document.getElementById('fullStats').innerHTML='<div class="stat-tile"><div class="label">'+t('total')+'</div><div class="value">'+stats.total+'</div></div><div class="stat-tile accent"><div class="label">'+t('new_lbl')+'</div><div class="value">'+stats.newToday+'</div></div><div class="stat-tile green"><div class="label">Conversion</div><div class="value">'+convPct+'<span class="unit">%</span></div></div><div class="stat-tile"><div class="label">'+t('history')+'</div><div class="value">'+stats.historialCount+'</div></div>';var maxS=Math.max.apply(null,stats.byStatus.map(function(s){return+s.count}).concat([1]));var sh='';for(var i=0;i<stats.byStatus.length;i++){var s=stats.byStatus[i];sh+='<div class="breakdown-row"><span class="breakdown-label">'+s.status+'</span><div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:'+Math.round(s.count/maxS*100)+'%"></div></div><span class="breakdown-count">'+s.count+'</span></div>'}document.getElementById('statusBreakdown').innerHTML=sh;var maxA=Math.max.apply(null,stats.byAgent.map(function(a){return+a.count}).concat([1]));var ah='';for(var j=0;j<stats.byAgent.length;j++){var a=stats.byAgent[j];if(!a.agent)continue;ah+='<div class="breakdown-row"><span class="breakdown-label">'+esc(a.agent)+'</span><div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:'+Math.round(a.count/maxA*100)+'%"></div></div><span class="breakdown-count">'+a.count+'</span></div>'}document.getElementById('agentBreakdown').innerHTML=ah||'<div style="color:var(--text-muted);padding:8px">'+t('no_data')+'</div>'}catch(e){document.getElementById('fullStats').innerHTML='<div style="color:var(--red)">'+e.message+'</div>'}}

(async function(){
  applyLang();
  // Admin password gate
  if(IS_ADMIN){
    var stored=localStorage.getItem('sahiba_admin_pass');
    if(stored!=='1993'){
      var pass=prompt('Admin Password:');
      if(pass!=='1993'){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--red);font-family:inherit;font-size:18px">Access Denied</div>';return}
      localStorage.setItem('sahiba_admin_pass','1993');
    }
    LANG='en';localStorage.setItem('sahiba_lang','en');applyLang();
  }
  try{await api('/init','POST')}catch(e){}
  showMsgFor(currentAgent);loadContacts();
})();
</script>
</body>
</html>
