[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Bump if any function exceeds default (10s on free tier, 26s on paid)
  # timeout = 26

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5174
  publish = "dist"
  autoLaunch = false

# Frontend calls /api/* — rewrite to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Clean URLs for the Respond Tracker static page
# So agents can use /respond?v=nancy instead of /respond.html?v=nancy
[[redirects]]
  from = "/respond"
  to = "/respond.html"
  status = 200

# SPA fallback so React Router routes (/leads, /tracker, etc.) work on refresh.
# Static files (including /respond.html) are served first because force isn't set.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
